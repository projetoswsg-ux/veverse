<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneroverse | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
        }
        .glow {
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
        }
        .neon-glow {
            animation: glow-pulse 3s infinite ease-in-out;
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .bg-gradient-radial {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-radial p-4">

    <div class="max-w-2xl w-full text-center space-y-8">
        
        <div class="relative flex justify-center mb-12">
            <div class="absolute w-40 h-40 bg-orange-600 rounded-full blur-[60px] neon-glow"></div>
            <img src="https://i.postimg.cc/7h8N50pS/Picsart-26-06-28-07-23-01-884.png" alt="Moneroverse Logo" class="w-40 h-auto relative z-10 drop-shadow-2xl">
        </div>

        <!-- Headline Section -->
        <div class="space-y-4">
            <h1 class="text-5xl md:text-7xl tracking-tighter glow">
                <span class="text-[#FF6600] font-thin">Monero</span><span class="text-white font-medium">verse</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl font-light">
                The frontier of privacy-focused digital experiences is under construction.
            </p>
        </div>

        <div class="bg-gray-900 p-2 rounded-2xl border border-gray-800 shadow-xl max-w-md mx-auto">
            <form id="subscribeForm" class="flex flex-col sm:flex-row gap-2" onsubmit="handleSubscribe(event)">
                <input 
                    type="email" 
                    id="emailInput"
                    placeholder="Enter your email" 
                    class="flex-1 bg-transparent px-4 py-3 outline-none text-white placeholder-gray-600"
                    required
                >
                <button 
                    type="submit" 
                    class="bg-orange-600 hover:bg-orange-500 text-white font-semibold px-6 py-3 rounded-xl transition duration-300"
                >
                    Notify Me
                </button>
            </form>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="hidden text-orange-500 font-medium"></div>

        <div class="pt-12 flex justify-center space-x-6 text-gray-500">
            <a href="https://twitter.com/moneroverse" target="_blank" class="hover:text-orange-500 transition">Twitter</a>
            <a href="mailto:moneroverse@gmail.com" class="hover:text-orange-500 transition">Email</a>
            <a href="https://codeberg.org/Moneroverse/Moneroverse.git" target="_blank" class="hover:text-orange-500 transition">Codeberg</a>
        </div>
    </div>

    <script>
        function handleSubscribe(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value;
            const statusDiv = document.getElementById('statusMessage');
            
            // Simulation of submission
            if(email) {
                statusDiv.textContent = "Thank you! You're on the whitelist.";
                statusDiv.classList.remove('hidden');
                document.getElementById('subscribeForm').classList.add('opacity-50', 'pointer-events-none');
            }
        }
    </script>
</body>
</html>
